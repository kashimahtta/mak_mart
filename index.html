<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mak Mart — Toddler Mode Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top">
      <h1>Mak Mart</h1>
      <div class="toggle">
        <div class="switch">
          <input id="modeSwitch" type="checkbox" />
          <label for="modeSwitch" aria-label="Mode switch"></label>
        </div>
      </div>
    </header>

    <main>
      <section class="controls">
        <form id="searchForm">
          <input id="q" type="search" placeholder="Search items" />
          <button type="submit">Search</button>
        </form>

        <form id="addForm" class="add-form" title="Add new item">
          <input
            id="addName"
            placeholder="Item name (e.g. Lipstick)"
            required
          />
          <input id="addPrice" placeholder="Price (e.g. ₹299)" />
          <input id="addImage" placeholder="Image URL (optional)" />
          <select id="addCategory">
            <option value="girls">Girls (pink)</option>
            <option value="boys">Boys (blue)</option>
          </select>
          <label class="inline"
            ><input id="addAvailable" type="checkbox" checked /> In stock</label
          >
          <button type="submit">Add Item</button>
        </form>
      </section>

      <section id="cards" class="cards" aria-live="polite"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
